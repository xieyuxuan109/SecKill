version: '3.8'

services:
  redis:
    image: redis:6.2
    container_name: sec_redis
    ports:
      - "6379:6379"
    networks:
      - seckill-network

  zookeeper:
    image: zookeeper:3.8.4
    container_name: sec_zookeeper
    ports:
      - "2181:2181"
      - "2888:2888"
      - "3888:3888"
    networks:
      - seckill-network

  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    container_name: sec_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://10.17.220.221:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    depends_on:
      - zookeeper
    networks:
      - seckill-network

  mysql:
    image: mysql:8.0
    container_name: sec_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - seckill-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: sec_etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    command: /usr/local/bin/etcd --name s1 --data-dir /etcd-data --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://10.17.220.221:2379 --listen-peer-urls http://0.0.0.0:2380 --initial-advertise-peer-urls http://10.17.220.221:2380 --initial-cluster s1=http://10.17.220.221:2380 --initial-cluster-token tkn --initial-cluster-state new
    networks:
      - seckill-network

networks:
  seckill-network:
    driver: bridge
