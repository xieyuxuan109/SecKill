version: '3'

services:
  mysql:
    image: mysql:8.0
    container_name: sec_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:6.2
    container_name: sec_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  zookeeper:
    image: zookeeper:3.8.4
    container_name: sec_zookeeper
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.1
    container_name: sec_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://10.17.220.221:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER   # 修复 KRaft 启动问题
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: sec_etcd
    environment:
      ALLOW_NONE_AUTHENTICATION: yes
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://10.17.220.221:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data: